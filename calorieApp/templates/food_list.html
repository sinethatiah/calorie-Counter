<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calorie Counter</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="mb-4 text-center">🍽️ Calorie Counter</h1>

          <form method="POST" class="row g-2 mb-4">
            {% csrf_token %}
            <div class="col-sm-6">{{ form.name }}</div>
            <div class="col-sm-4">{{ form.calories }}</div>
            <div class="col-sm-2">
              <button type="submit" class="btn btn-primary w-100">Add</button>
            </div>
          </form>

          <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Food</th>
                <th>Calories</th>
              </tr>
            </thead>
            <tbody>
              {% for food in foods %}
              <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ food.food_name }}</td>
                <td>{{ food.food_calories }} kcal</td>
              </tr>
              {% empty %}
              <tr>
                <td colspan="3" class="text-center text-muted">
                  No food added yet.
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>

          <div class="d-flex justify-content-between align-items-center mt-4">
            <h4 class="mb-0">
              Total:
              <span class="badge bg-success">{{ total_calories }} kcal</span>
            </h4>

            <form method="POST" action="{% url 'reset_foods' %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-outline-danger">
                Reset All
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
